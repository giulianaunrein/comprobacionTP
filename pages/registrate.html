<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión</title>
    <link rel="stylesheet" href="../styles/registro.css">
</head>
<body>

  <header class="encabezado"> 
        <section class="menu-izquierda">
          <a href="../index.html"><img class="logo"  src="../images/logo.png" alt="logo" height="35"></a>
        </section>
          <nav>
            <a href="condiciones.html">Terminos y Condiciones</a>
        </nav>
    </header>

    <main class="contenedor">
        <section class="form_registro">

            <h2>Registrarse</h2>

            <p>
                Creá tu cuenta para empezar a viajar.
            </p>
            <form id="formRegistro">
                <label for="nombre">Nombre completo</label>
                <input type="text" id="nombre" placeholder="Nombre completo">

                <label for="correo">Correo electrónico</label>
                <input type="email" id="email" placeholder="Correo electrónico">

                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Contraseña">

                <label for="confirmar">Confirmar contraseña</label>
                <input type="password" id="confirmar" placeholder="Confirmá tu contraseña">

                <div class="check">
                    <input type="checkbox" id="terminos">
                    <label for="terminos">Acepto términos y condiciones</label>
                </div>

                <button type="button" id="boton">Crear cuenta</button>
            </form>
                    <p id="mensaje"></p>
    <p class="volver-inicio">
                ¿Ya tenés cuenta? <a href="InicioSesion.html">Iniciar sesión</a>
            </p>

        </section>
    </main>

    <script src="../js/registro.js"></script>
</body>
</html>
