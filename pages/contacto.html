<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/header.css">
    <link rel="stylesheet" href="../styles/footer.css">
    <link rel="stylesheet" href="../styles/contacto.css">
    <title>Contacto</title>
</head>

<body>

    
<mi-header></mi-header>

    <section class="contacto-section">
        <h2>Contacto</h2>
        <div>
            <p>
                Te invitamos a mirar la sección de <a class="redireccion" href="../index.html">preguntas frecuentes</a>
                donde seguro podrás encontrar muchas de las respuestas a tus consultas. En caso de sugerencias,
                problemas u otra consula podes ponerte en contacto con nosotros por el formulario.
            </p>
        </div>

        <!-- novalidate para que el navegador no use sus validaciones por defecto -->
        <form class="contacto-form" id="form-contacto" novalidate>
            <div class="grupo-input">
                <input type="text" id="nombre" placeholder="Nombre">
            </div>

            <div class="grupo-input">
                <input type="email" id="email" placeholder="Email">
            </div>

            <div class="grupo-input">
                <input type="tel" id="telefono" placeholder="Teléfono">
            </div>

            <div class="grupo-input">
                <textarea id="mensaje" placeholder="Mensaje" rows="5"></textarea>
            </div>

            <button type="submit" class="btn-enviar">Enviar</button>
        </form>
    </section>

<mi-footer></mi-footer>

    <script src="../js/contacto.js"></script>
    <script src="/js/componentes.js"></script>
</body>

</html>
